name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install gradio playwright openpyxl nuitka zstandard
          pip install gradio playwright openpyxl nuitka zstandard aiofiles

      - name: Установка Playwright Chromium
        run: playwright install chromium

      - name: Сборка EXE через Nuitka
        shell: pwsh
        run: python -m nuitka --mode=standalone --windows-console-mode=disable --include-package=gradio --include-package=gradio_client --include-package=uvicorn --include-package=fastapi --include-package=starlette --include-package=anyio --include-package=httpx --include-package=openpyxl --include-package=playwright --include-package=numpy --include-package=safehttpx --include-package=pydantic --include-package=websockets --assume-yes-for-downloads --output-filename=HH_Parser.exe hh_gradio.py

      - name: Копирование Playwright-браузеров
        shell: pwsh
        run: |
          $browsers = "$env:USERPROFILE\AppData\Local\ms-playwright"
          $dest = "playwright_browsers"
          if (Test-Path $browsers) {
            Copy-Item -Recurse -Force $browsers $dest
            Write-Host "Браузеры скопированы"
          } else {
            Write-Host "Папка браузеров не найдена"
            exit 1
          }

      - name: Создание папки для архива
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path HH_Parser_dist
          Copy-Item -Recurse hh_gradio.dist\* HH_Parser_dist\
          Copy-Item -Recurse playwright_browsers HH_Parser_dist\

      - name: Архивация в ZIP
        run: |
          Compress-Archive -Path HH_Parser_dist\* -DestinationPath HH_Parser_Windows.zip

      - name: Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: HH_Parser_Windows
          path: HH_Parser_Windows.zip
          retention-days: 30
